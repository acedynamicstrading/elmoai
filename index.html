<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a12">
<title>Elmo AI</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#060a12;--bg2:#0b1220;--bg3:#111827;--bg4:#1a2335;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --teal:#00d4c8;--teal2:#00b8ad;
  --gold:#c9a84c;--gold2:#e8c96a;
  --green:#22c55e;--red:#ff5f5f;
  --text:#e8edf5;--muted:rgba(232,237,245,0.42);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
  --nav:60px;
}
html,body{height:100%;height:-webkit-fill-available;overflow:hidden;}
body{
  font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;position:fixed;width:100%;top:0;left:0;
}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--bg);z-index:1000;padding:24px;
}
.login-glow{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(0,212,200,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.login-logo{
  font-size:clamp(3rem,13vw,4.5rem);font-weight:800;letter-spacing:-0.04em;
  margin-bottom:6px;position:relative;z-index:1;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-sub{font-size:0.72rem;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:48px;}
.login-box{width:100%;max-width:300px;}
.login-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);
  padding:16px 18px;border-radius:14px;font-size:1rem;font-family:'JetBrains Mono',monospace;
  letter-spacing:0.12em;outline:none;margin-bottom:10px;text-align:center;-webkit-appearance:none;
  transition:border-color 0.2s;
}
.login-input:focus{border-color:var(--teal);}
.login-btn{
  width:100%;background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;
  color:#060a12;padding:16px;border-radius:14px;font-size:0.9rem;font-weight:700;
  font-family:'Syne',sans-serif;letter-spacing:0.06em;cursor:pointer;
}
.login-btn:active{opacity:0.8;}
.login-err{color:var(--red);font-size:0.76rem;text-align:center;margin-top:10px;display:none;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100%;height:-webkit-fill-available;overflow:hidden;}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;padding-top:calc(10px + var(--st));
  border-bottom:1px solid var(--border);flex-shrink:0;
  background:rgba(6,10,18,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.topbar-left{display:flex;align-items:center;gap:10px;}
.ai-avatar{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;color:#060a12;
}
.ai-name{font-size:0.95rem;font-weight:700;line-height:1.2;}
.ai-status{display:flex;align-items:center;gap:5px;font-size:0.62rem;color:var(--teal);font-family:'JetBrains Mono',monospace;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;flex-shrink:0;}
.status-dot.busy{background:#ffaa00;}
.status-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.topbar-right{display:flex;gap:6px;}
.tbtn{
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  padding:7px 10px;border-radius:8px;font-size:0.75rem;cursor:pointer;
  font-family:'Syne',sans-serif;display:flex;align-items:center;gap:4px;min-height:34px;
}
.tbtn:active{background:var(--bg4);}
#install-btn{display:none;}

/* ── PAGES ── */
.page{display:none;flex:1;overflow:hidden;flex-direction:column;}
.page.active{display:flex;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  display:flex;border-top:1px solid var(--border);flex-shrink:0;
  background:rgba(6,10,18,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding-bottom:var(--sb);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 4px;gap:3px;background:none;border:none;cursor:pointer;
  color:var(--muted);font-family:'Syne',sans-serif;font-size:0.6rem;font-weight:600;
  letter-spacing:0.04em;text-transform:uppercase;min-height:var(--nav);
  transition:color 0.15s;position:relative;
}
.nav-btn .icon{font-size:1.3rem;line-height:1;}
.nav-btn.active{color:var(--teal);}
.nav-btn.active::after{
  content:'';position:absolute;top:0;left:20%;right:20%;height:2px;
  background:var(--teal);border-radius:0 0 2px 2px;
}
.nav-badge{
  position:absolute;top:6px;right:calc(50% - 16px);
  background:var(--red);color:#fff;font-size:0.55rem;
  width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;
}

/* ── CHAT PAGE ── */
.quick-strip{
  display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.quick-strip::-webkit-scrollbar{display:none;}
.qa-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  padding:6px 14px;border-radius:99px;font-size:0.7rem;font-family:'Syne',sans-serif;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.qa-btn:active{border-color:var(--teal);color:var(--teal);}

.chat-area{
  flex:1;overflow-y:auto;padding:14px 12px 8px;
  display:flex;flex-direction:column;gap:10px;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
}
.welcome{text-align:center;padding:32px 16px;max-width:380px;margin:auto;}
.welcome-icon{
  font-size:3rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:10px;
  background:linear-gradient(135deg,var(--teal),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome h2{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
.welcome p{font-size:0.8rem;color:var(--muted);line-height:1.7;}

.msg{display:flex;flex-direction:column;gap:3px;max-width:88%;animation:msgIn 0.18s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.ai{align-self:flex-start;align-items:flex-start;}
.msg-lbl{font-size:0.58rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
.msg-bubble{padding:12px 14px;border-radius:16px;font-size:0.875rem;line-height:1.72;word-break:break-word;}
.msg.user .msg-bubble{background:rgba(0,212,200,0.09);border:1px solid rgba(0,212,200,0.18);border-radius:16px 16px 4px 16px;}
.msg.ai .msg-bubble{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px 16px 16px 4px;}
.msg-bubble p{margin-bottom:.5em;}.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble strong{font-weight:700;}
.msg-bubble em{color:var(--gold2);font-style:italic;}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-weight:700;margin:.7em 0 .2em;color:var(--teal);}
.msg-bubble h1{font-size:1.05em;}.msg-bubble h2{font-size:.98em;}.msg-bubble h3{font-size:.9em;}
.msg-bubble ul,.msg-bubble ol{padding-left:1.2em;margin:.3em 0;}
.msg-bubble li{margin-bottom:.18em;}
.msg-bubble code{font-family:'JetBrains Mono',monospace;font-size:.78em;background:rgba(0,212,200,0.1);padding:1px 5px;border-radius:3px;color:var(--teal);}
.msg-bubble pre{background:rgba(0,0,0,0.4);border:1px solid var(--border2);border-radius:8px;padding:11px;margin:7px 0;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.6;color:#b8c9e0;}
.msg-bubble pre code{background:none;padding:0;color:inherit;font-size:inherit;}
.msg-bubble blockquote{border-left:3px solid var(--teal2);padding-left:10px;margin:5px 0;color:var(--muted);font-style:italic;}
.msg-bubble a{color:var(--teal);text-decoration:underline;word-break:break-all;}
.msg-bubble hr{border:none;border-top:1px solid var(--border);margin:8px 0;}
.msg-bubble table{width:100%;border-collapse:collapse;margin:6px 0;font-size:.78em;}
.msg-bubble th{background:var(--bg3);padding:5px 8px;border:1px solid var(--border2);font-weight:600;text-align:left;}
.msg-bubble td{padding:5px 8px;border:1px solid var(--border);}

.meta-badges{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;font-size:.62rem;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;}
.badge.search{color:rgba(0,212,200,.7);background:rgba(0,212,200,.08);}
.badge.file{color:rgba(201,168,76,.75);background:rgba(201,168,76,.09);}
.badge.mem{color:rgba(34,197,94,.7);background:rgba(34,197,94,.08);}
.badge.ability{color:rgba(167,139,250,.7);background:rgba(167,139,250,.08);}

.msg-actions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.msg-action{
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  font-size:.65rem;cursor:pointer;font-family:'Syne',sans-serif;
  padding:4px 10px;border-radius:6px;
}
.msg-action:active{color:var(--text);border-color:var(--border2);}
.msg-action.gold{color:var(--gold);border-color:rgba(201,168,76,.3);}
.msg-action.green{color:var(--green);border-color:rgba(34,197,94,.3);}

.typing-indicator{display:none;align-self:flex-start;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px 16px 16px 4px;gap:5px;align-items:center;}
.typing-indicator.show{display:flex;}
.typing-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);opacity:.6;animation:tdot 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* ── INPUT AREA ── */
.input-area{
  border-top:1px solid var(--border);flex-shrink:0;
  background:rgba(6,10,18,0.96);padding:8px 10px;
}
.attached-files{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.attach-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.28);
  color:var(--gold);padding:3px 8px;border-radius:6px;font-size:.68rem;
  font-family:'JetBrains Mono',monospace;max-width:160px;
}
.attach-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.attach-chip .rm{background:none;border:none;color:var(--gold);cursor:pointer;padding:0;font-size:.9rem;}
.input-row{
  display:flex;gap:6px;align-items:flex-end;
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:14px;
  padding:7px 7px 7px 13px;transition:border-color .2s;
}
.input-row:focus-within{border-color:var(--teal);}
#chat-input{
  flex:1;background:none;border:none;color:var(--text);
  font-size:.92rem;font-family:'Syne',sans-serif;resize:none;outline:none;
  max-height:120px;min-height:22px;line-height:1.5;scrollbar-width:none;-webkit-appearance:none;
}
#chat-input::placeholder{color:var(--muted);}
#chat-input::-webkit-scrollbar{display:none;}
.input-btns{display:flex;gap:2px;align-items:flex-end;flex-shrink:0;}
.icon-btn{
  background:none;border:none;width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:1.05rem;position:relative;
}
.icon-btn:active{background:var(--bg4);color:var(--text);}
.icon-btn.on{color:var(--teal);background:rgba(0,212,200,.1);}
.icon-btn.on::after{content:'';position:absolute;bottom:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--teal);}
.send-btn{
  background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#060a12;font-size:1rem;font-weight:700;flex-shrink:0;
}
.send-btn:active{opacity:.75;}
.send-btn:disabled{opacity:.35;cursor:default;}
.input-hint{text-align:center;font-size:.57rem;color:rgba(255,255,255,.12);margin-top:5px;font-family:'JetBrains Mono',monospace;}

/* ── MEMORY PAGE ── */
.page-header{
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.page-title{font-size:.88rem;font-weight:700;}
.page-subtitle{font-size:.65rem;color:var(--muted);margin-top:1px;}
.page-action{
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  padding:6px 12px;border-radius:8px;font-size:.72rem;cursor:pointer;font-family:'Syne',sans-serif;
}
.page-action:active{color:var(--text);}
.page-action.primary{background:rgba(0,212,200,.1);border-color:rgba(0,212,200,.3);color:var(--teal);}

.mem-scroll{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
.mem-core-box{
  background:var(--bg3);border:1px solid var(--border2);border-radius:12px;
  padding:12px;margin-bottom:10px;
}
.mem-core-label{font-size:.65rem;color:var(--teal);font-family:'JetBrains Mono',monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;}
.mem-core-ta{
  width:100%;background:none;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:.76rem;line-height:1.7;resize:none;outline:none;min-height:120px;-webkit-appearance:none;
}
.mem-save-btn{
  width:100%;background:var(--teal);color:#060a12;border:none;
  padding:11px;border-radius:10px;font-weight:700;font-family:'Syne',sans-serif;
  font-size:.8rem;cursor:pointer;margin-top:8px;
}
.mem-save-btn:active{opacity:.8;}

.mem-note-input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);
  padding:10px 12px;border-radius:10px;font-size:.82rem;font-family:'Syne',sans-serif;
  outline:none;resize:none;height:60px;-webkit-appearance:none;margin-bottom:6px;
}
.mem-note-input:focus{border-color:var(--teal);}

.life-entry{
  background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  padding:11px 13px;margin-bottom:7px;
}
.life-ts{font-size:.6rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.life-cat{
  display:inline-block;font-size:.62rem;padding:1px 7px;border-radius:4px;
  background:rgba(201,168,76,.1);color:var(--gold);font-family:'JetBrains Mono',monospace;margin-bottom:5px;
}
.life-text{font-size:.8rem;line-height:1.65;color:var(--text);}

.section-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:'JetBrains Mono',monospace;margin:12px 0 6px;}
.divider{height:1px;background:var(--border);margin:14px 0;}

/* ── ABILITIES PAGE ── */
.ability-filters{
  display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
.ability-filters::-webkit-scrollbar{display:none;}
.filter-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--muted);
  padding:5px 12px;border-radius:99px;font-size:.7rem;font-family:'Syne',sans-serif;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.filter-btn.active{background:rgba(0,212,200,.1);border-color:rgba(0,212,200,.35);color:var(--teal);}
.filter-btn:active{border-color:var(--teal);}

.abilities-scroll{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;}
.ability-card{
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;position:relative;
}
.ability-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.ability-title{font-size:.85rem;font-weight:700;line-height:1.3;}
.ability-cat{
  font-size:.6rem;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;
  font-family:'JetBrains Mono',monospace;
}
.ability-cat.Coding{background:rgba(0,212,200,.1);color:var(--teal);}
.ability-cat.Legal{background:rgba(201,168,76,.1);color:var(--gold);}
.ability-cat.Business{background:rgba(34,197,94,.1);color:var(--green);}
.ability-cat.Personal{background:rgba(167,139,250,.1);color:#a78bfa;}
.ability-cat.General{background:rgba(255,255,255,.07);color:var(--muted);}
.ability-preview{font-size:.76rem;color:var(--muted);line-height:1.6;margin-bottom:7px;}
.ability-meta{display:flex;align-items:center;justify-content:space-between;}
.ability-ts{font-size:.6rem;color:rgba(255,255,255,.22);font-family:'JetBrains Mono',monospace;}
.ability-del{background:none;border:none;color:rgba(255,95,95,.4);cursor:pointer;font-size:.75rem;padding:2px 4px;}
.ability-del:active{color:var(--red);}

.learn-input-wrap{
  padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;
  background:rgba(6,10,18,0.96);
}
.learn-row{display:flex;gap:6px;}
.learn-input{
  flex:1;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text);
  padding:10px 13px;border-radius:12px;font-size:.85rem;font-family:'Syne',sans-serif;
  outline:none;-webkit-appearance:none;
}
.learn-input:focus{border-color:var(--teal);}
.learn-btn{
  background:linear-gradient(135deg,var(--teal),var(--teal2));border:none;
  color:#060a12;padding:10px 16px;border-radius:12px;font-weight:700;
  font-family:'Syne',sans-serif;font-size:.8rem;cursor:pointer;white-space:nowrap;
}
.learn-btn:active{opacity:.8;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:.82rem;line-height:1.7;}
.empty-state .ei{font-size:2rem;margin-bottom:10px;}

/* ── SETTINGS PAGE ── */
.settings-scroll{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
.setting-section{margin-bottom:18px;}
.setting-section-title{
  font-size:.65rem;color:var(--teal);text-transform:uppercase;letter-spacing:.12em;
  font-family:'JetBrains Mono',monospace;margin-bottom:8px;
}
.setting-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.setting-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;border-bottom:1px solid var(--border);gap:10px;
}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:.82rem;font-weight:600;}
.setting-sub{font-size:.66rem;color:var(--muted);margin-top:1px;}
.setting-input{
  background:var(--bg4);border:1px solid var(--border2);color:var(--text);
  padding:6px 10px;border-radius:8px;font-size:.78rem;font-family:'JetBrains Mono',monospace;
  outline:none;width:160px;-webkit-appearance:none;
}
.setting-input:focus{border-color:var(--teal);}
.setting-input.full{width:100%;margin-top:8px;}
.setting-full-row{padding:13px 14px;border-bottom:1px solid var(--border);}
.setting-full-row:last-child{border-bottom:none;}

.keys-list{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.key-item{
  display:flex;align-items:center;gap:8px;background:var(--bg4);
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;
}
.key-item .key-icon{font-size:.8rem;color:var(--green);}
